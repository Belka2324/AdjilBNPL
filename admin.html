<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADJIL ADMIN PORTAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif }
    .glass { backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div id="app"></div>

  <template id="tpl-login">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-sm glass bg-white/5 border border-white/10 rounded-3xl p-8 space-y-6">
        <div class="text-center space-y-2">
          <img src="assets/Logo AD.png" class="w-16 mx-auto rounded-xl" alt="ADJIL">
          <div class="text-xs text-slate-400">بوابة الإدارة</div>
          <h1 class="text-xl font-black">ADJIL ADMIN PORTAL</h1>
        </div>
        <div class="flex justify-center mb-4">
          <button id="toggle-mode" class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800 hover:bg-slate-700 transition-all border border-slate-700">
            <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
            <span id="mode-label" class="text-xs font-bold text-slate-300">متصل (Supabase)</span>
          </button>
        </div>
        <div class="space-y-3">
          <div class="space-y-1">
            <label class="text-xs text-slate-400">البريد الإلكتروني</label>
            <input id="admin-email" type="email" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none" placeholder="you@adjil.dz">
          </div>
          <div class="space-y-1">
            <label class="text-xs text-slate-400">كلمة المرور</label>
            <input id="admin-password" type="password" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none" placeholder="••••••••">
          </div>
          <button id="btn-admin-login" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold">تسجيل الدخول</button>
          <div id="admin-login-error" class="text-center text-sm text-red-400 hidden"></div>
          <p class="text-[10px] text-slate-500 text-center">للدخول المحلي التجريبي: admin / admin</p>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-dashboard">
    <div class="min-h-screen">
      <header class="sticky top-0 z-20 bg-slate-950/70 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <img src="assets/Logo AD.png" class="w-8 h-8 rounded-md" alt="ADJIL">
            <div class="font-black">ADJIL ADMIN PORTAL</div>
          </div>
          <nav class="flex items-center gap-2">
            <button data-tab="overview" class="admin-tab px-4 py-2 rounded-xl text-sm bg-white/5 hover:bg-white/10 border border-white/10">نظرة عامة</button>
            <button data-tab="users" class="admin-tab px-4 py-2 rounded-xl text-sm bg-white/5 hover:bg-white/10 border border-white/10">المستخدمون</button>
            <button data-tab="transactions" class="admin-tab px-4 py-2 rounded-xl text-sm bg-white/5 hover:bg-white/10 border border-white/10">المعاملات</button>
            <button data-tab="tickets" class="admin-tab px-4 py-2 rounded-xl text-sm bg-white/5 hover:bg-white/10 border border-white/10">تذاكر الدعم</button>
            <button data-tab="settings" class="admin-tab px-4 py-2 rounded-xl text-sm bg-white/5 hover:bg-white/10 border border-white/10">إعدادات</button>
            <button id="btn-admin-logout" class="px-4 py-2 rounded-xl text-sm bg-red-600 hover:bg-red-500">خروج</button>
          </nav>
        </div>
      </header>

      <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <section id="admin-overview" class="admin-section">
          <div class="grid sm:grid-cols-3 gap-4">
            <div class="glass bg-white/5 border border-white/10 p-6 rounded-2xl">
              <div class="text-xs text-slate-400">إجمالي المستخدمين</div>
              <div id="stat-users" class="text-3xl font-black mt-1">0</div>
            </div>
            <div class="glass bg-white/5 border border-white/10 p-6 rounded-2xl">
              <div class="text-xs text-slate-400">إجمالي المعاملات</div>
              <div id="stat-transactions" class="text-3xl font-black mt-1">0</div>
            </div>
            <div class="glass bg-white/5 border border-white/10 p-6 rounded-2xl">
              <div class="text-xs text-slate-400">تذاكر الدعم</div>
              <div id="stat-tickets" class="text-3xl font-black mt-1">0</div>
            </div>
          </div>
        </section>

        <section id="admin-users" class="admin-section hidden">
          <div class="flex items-center justify-between mb-3">
            <div class="font-bold">قائمة المستخدمين</div>
            <input id="users-search" type="text" placeholder="بحث بالاسم أو البريد" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:border-blue-500 outline-none">
          </div>
          <div class="overflow-auto border border-white/10 rounded-2xl">
            <table class="w-full text-sm">
              <thead class="bg-white/5 text-slate-300">
                <tr>
                  <th class="p-3 text-right">الاسم</th>
                  <th class="p-3 text-right">الدور</th>
                  <th class="p-3 text-right">الحالة</th>
                  <th class="p-3 text-right">الرصيد</th>
                  <th class="p-3 text-right">البريد</th>
                </tr>
              </thead>
              <tbody id="users-tbody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </section>

        <section id="admin-transactions" class="admin-section hidden">
          <div class="flex items-center justify-between mb-3">
            <div class="font-bold">سجل المعاملات</div>
            <input id="tx-search" type="text" placeholder="بحث بالاسم أو المعرّف" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:border-blue-500 outline-none">
          </div>
          <div class="overflow-auto border border-white/10 rounded-2xl">
            <table class="w-full text-sm">
              <thead class="bg-white/5 text-slate-300">
                <tr>
                  <th class="p-3 text-right">المعرف</th>
                  <th class="p-3 text-right">المبلغ</th>
                  <th class="p-3 text-right">الطريقة</th>
                  <th class="p-3 text-right">التاريخ</th>
                  <th class="p-3 text-right">التاجر</th>
                  <th class="p-3 text-right">الزبون</th>
                  <th class="p-3 text-right">الحالة</th>
                </tr>
              </thead>
              <tbody id="tx-tbody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </section>

        <section id="admin-tickets" class="admin-section hidden">
          <div class="flex items-center justify-between mb-3">
            <div class="font-bold">تذاكر الدعم</div>
          </div>
          <div class="overflow-auto border border-white/10 rounded-2xl">
            <table class="w-full text-sm">
              <thead class="bg-white/5 text-slate-300">
                <tr>
                  <th class="p-3 text-right">المعرف</th>
                  <th class="p-3 text-right">البريد</th>
                  <th class="p-3 text-right">الموضوع</th>
                  <th class="p-3 text-right">التاريخ</th>
                  <th class="p-3 text-right">الحالة</th>
                </tr>
              </thead>
              <tbody id="tickets-tbody" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </section>

        <section id="admin-settings" class="admin-section hidden">
          <div class="glass bg-white/5 border border-white/10 p-6 rounded-2xl space-y-3">
            <div class="font-bold">إعدادات عامة</div>
            <div class="text-sm text-slate-400">بوابة إدارية بسيطة لعرض بيانات Adjil.BNPL. يعتمد الدخول عبر Supabase Auth. لا يتم تسريب مفاتيح حساسة للمتصفح.</div>
          </div>
        </section>
      </main>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <!-- Using enhanced admin/js/admin.js which supports local/online toggle mode -->
  <script src="admin/js/admin.js"></script>
</body>
</html>
